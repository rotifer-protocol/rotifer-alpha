name = "polymarket-agent"
main = "src/index.ts"
compatibility_date = "2026-03-01"
workers_dev = true

[vars]
# Pipeline routing feature flag.
# "false" (default) = legacy runPipeline path (direct module calls).
# "true"            = runGenomePipeline (Genome orchestrator + Gene variant dispatch).
# To rollback: change to "false" and redeploy — no code change required.
ENABLE_GENOME_PIPELINE = "true"

# Scanner: only scan markets resolving within this many days (0 = no filter).
# 60 days filters out multi-month season markets (NBA/FIFA final) while keeping
# near-term event markets. Adjust upward if signal count drops too low.
SCAN_END_DATE_WINDOW_DAYS = "60"

# Scanner: total unique markets to fetch per scan cycle.
# 2026-05-06: raised from default 200 to 500 — old SCAN_TAGS approach was broken
# (all 6 tags returned the same default market list, yielding ~33 unique markets).
# New scan.ts uses offset pagination [0,100,200,300,400] × 100 = 500 unique markets.
# Verified: from 2 → 12 multi-outcome events visible (+6x) per scan cycle.
SCAN_LIMIT = "500"

# Code evolution: trades across all active gene variants before epoch triggers.
# Default 5 (was 10 → 50) — lower threshold enables more genes to participate in each epoch.
EPOCH_TRADE_THRESHOLD = "5"

# Code evolution: minimum trades per variant for score to count in evaluation.
# Default 3 (was 5) — lower bar matches the smaller epoch window.
MIN_TRADES_FOR_EVAL = "3"

routes = [
  { pattern = "api.rotifer.xyz", custom_domain = true }
]

[triggers]
# */5 = pipeline cron (every 5 min)
# 0 1 = daily report (01:00 UTC)
# 0 0 * * * = PBT parameter evolution (daily 00:00 UTC, was weekly SUN)
#   SKIP_INSUFFICIENT guard in evolve.ts ensures no-op when data is insufficient.
crons = ["*/5 * * * *", "0 1 * * *", "0 0 * * *"]

[ai]
binding = "AI"

[[d1_databases]]
binding = "DB"
database_name = "polymarket-signals"
database_id = "482e3d91-d775-486a-920c-b61517baa52f"

[durable_objects]
bindings = [
  { name = "LIVE_HUB", class_name = "LiveHub" },
  { name = "RISK_MONITOR", class_name = "RiskMonitor" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["LiveHub"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["RiskMonitor"]
